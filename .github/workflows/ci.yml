name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: make lint

      - name: Format check
        run: make format-check

      - name: Type check
        run: make typecheck

      - name: Test
        run: make test

      - name: Build workflow
        run: make build

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ay-alfred-homeassistant.alfredworkflow
          path: dist/ay-alfred-homeassistant.alfredworkflow
          if-no-files-found: error
