name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: make lint

      - name: Format check
        run: make format-check

      - name: Type check
        run: make typecheck

      - name: Test
        run: make test

      - name: Build workflow
        run: make build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ay-alfred-homeassistant.alfredworkflow
          generate_release_notes: true
